{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OOU Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>

        body{
            background:#f3f5f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial, Helvetica, sans-serif;
        }

        .login-card{

            width:420px;

            background:#fff;

            border-radius:15px;

            padding:40px;

            box-shadow:0 5px 20px rgba(0,0,0,.15);

        }

        .logo{

            text-align:center;

            margin-bottom:30px;

        }

        .logo h2{

            color:#006400;

            font-weight:bold;

        }

        .logo p{

            color:#777;

        }

        .btn-login{

            background:#006400;

            color:white;

            width:100%;

            padding:12px;

            border:none;

            border-radius:8px;

        }

        .btn-login:hover{

            background:#0b8f3d;

        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">

        <h2>OOU HELP DESK</h2>

        <p>Administrator Login</p>

    </div>

    {% if error %}

    <div class="alert alert-danger">

        {{ error }}

    </div>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>Username</label>

            <input
                type="text"
                name="username"
                class="form-control"
                required>

        </div>

        <div class="mb-4">

            <label>Password</label>

            <input
                type="password"
                name="password"
                class="form-control"
                required>

        </div>

        <button class="btn-login">

            <i class="fas fa-lock"></i>

            Login

        </button>

    </form>

</div>

</body>

</html>
