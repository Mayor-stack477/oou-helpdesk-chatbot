<!DOCTYPE html>
<html>
<head>

<title>OOU Help Desk Login</title>

<style>

body{

margin:0;
padding:0;
font-family:Arial;
background:#0b4f6c;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.card{

background:white;
padding:40px;

width:380px;

border-radius:12px;

box-shadow:0 10px 30px rgba(0,0,0,.2);

}

h2{

text-align:center;
color:#0b4f6c;

}

input{

width:100%;

padding:12px;

margin-top:15px;

border-radius:8px;

border:1px solid #ccc;

}

button{

width:100%;

padding:12px;

margin-top:20px;

background:#0b4f6c;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#08374a;

}

.error{

color:red;

text-align:center;

}

p{

text-align:center;

}

a{

color:#0b4f6c;

font-weight:bold;

text-decoration:none;

}

</style>

</head>

<body>

<div class="card">

<h2>Student Login</h2>

{% if error %}

<p class="error">{{error}}</p>

{% endif %}

<form method="POST">

{% csrf_token %}

<input

type="text"

name="matric_number"

placeholder="Matric Number"

required>

<input

type="password"

name="surname"

placeholder="Surname"

required>

<button>

Login

</button>

</form>

<p>

Don't have an account?

<a href="{% url 'signup' %}">

Sign Up

</a>

</p>

</div>

</body>

</html>
